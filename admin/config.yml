# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: phamhoangthong1999/vn30-prices
  branch: main
  identity_url: https://auth.decapbridge.com/sites/cf1cf1f9-ece6-454d-abf0-bd4158546d3f
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://phamhoangthong1999.github.io

media_folder: "images/blog-uploads"
public_folder: "/images/blog-uploads"

publish_mode: simple

locale: "vi"

collections:
  - name: "posts"
    label: "Bài viết Blog"
    label_singular: "Bài viết"
    folder: "src/blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "Thẻ chủ đề"
        name: "tags"
        widget: "list"
        default: ["Phân tích kỹ thuật"]
        hint: "Ví dụ: Phân tích kỹ thuật, Kiến thức cơ bản, Tin tức thị trường"
      - { label: "Mô tả ngắn (hiện ở trang danh sách)", name: "excerpt", widget: "text" }
      - { label: "Ảnh bìa", name: "cover", widget: "image", required: false }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }
