name: Cập nhật lịch sử VN-Index

on:
  schedule:
    # Giờ giao dịch HOSE (giờ VN, UTC+7): 9:00–11:30 và 13:00–15:00
    # Quy đổi sang UTC: 2:00–4:30 và 6:00–8:00
    - cron: '0,15,30,45 2,3 * * 1-5'   # 9:00 - 10:45 VN
    - cron: '0,15,30 4 * * 1-5'        # 11:00 - 11:30 VN
    - cron: '0,15,30,45 6,7 * * 1-5'   # 13:00 - 14:45 VN
    - cron: '0 8 * * 1-5'              # 15:00 VN (đóng cửa)
  workflow_dispatch: {}

jobs:
  update-vnindex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lấy dữ liệu VN-Index mới nhất
        env:
          SSI_CONSUMER_ID: ${{ secrets.SSI_CONSUMER_ID }}
          SSI_CONSUMER_SECRET: ${{ secrets.SSI_CONSUMER_SECRET }}
        run: node fetch-vnindex-history.js

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "vnindex-history-bot"
          git config user.email "actions@github.com"
          git add vnindex-history.json
          git diff --cached --quiet || git commit -m "Cập nhật VN-Index $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
